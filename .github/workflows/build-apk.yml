name: Build APK

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Install dependencies
        run: flutter pub get

      - name: Verify analysis
        run: flutter analyze --no-fatal-infos

      - name: Set timestamp
        id: ts
        run: echo "stamp=$(TZ='Asia/Shanghai' date '+%Y%m%d-%H%M')" >> "$GITHUB_OUTPUT"

      - name: Build APK (debug)
        run: flutter build apk --debug --no-tree-shake-icons

      - name: Build APK (release)
        run: flutter build apk --release --no-tree-shake-icons

      - name: Rename APKs with timestamp
        run: |
          mv build/app/outputs/flutter-apk/app-debug.apk \
             build/app/outputs/flutter-apk/ai-studio-monitor-debug-${{ steps.ts.outputs.stamp }}.apk
          mv build/app/outputs/flutter-apk/app-release.apk \
             build/app/outputs/flutter-apk/ai-studio-monitor-release-${{ steps.ts.outputs.stamp }}.apk

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: ai-studio-monitor-debug-${{ steps.ts.outputs.stamp }}
          path: build/app/outputs/flutter-apk/ai-studio-monitor-debug-${{ steps.ts.outputs.stamp }}.apk
          if-no-files-found: error

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: ai-studio-monitor-release-${{ steps.ts.outputs.stamp }}
          path: build/app/outputs/flutter-apk/ai-studio-monitor-release-${{ steps.ts.outputs.stamp }}.apk
          if-no-files-found: error

      - name: Upload to Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/app/outputs/flutter-apk/ai-studio-monitor-debug-${{ steps.ts.outputs.stamp }}.apk
            build/app/outputs/flutter-apk/ai-studio-monitor-release-${{ steps.ts.outputs.stamp }}.apk
          generate_release_notes: true
